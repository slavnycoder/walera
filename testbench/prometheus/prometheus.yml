# testbench/prometheus/prometheus.yml — Walera v1.1 testbench scrape config (Plan 09-01 / OBS-01).
#
# 1s scrape + 1s evaluation is intentional: live demos run < 60s, so sub-second
# spikes in the WAL pipeline must not alias on dashboards. Production uses 15s.
# Storage retention (1h) is configured via the prom/prometheus command-line in
# testbench/docker-compose.yml, not in this file.
# rule_files entry points at the k8s-stripped alerts file mounted alongside this one.

global:
  scrape_interval: 1s
  evaluation_interval: 1s

rule_files:
  - "/etc/prometheus/alerts.yaml"

scrape_configs:
  - job_name: walera
    static_configs:
      - targets: ["walera:8080"]
  - job_name: writer
    static_configs:
      - targets: ["writer:9100"]
