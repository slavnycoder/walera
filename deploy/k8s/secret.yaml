# deploy/k8s/secret.yaml — TEMPLATE ONLY. DO NOT APPLY DIRECTLY.
#
# ============================================================================
# CREATE-THEN-APPLY CONTRACT (SEC-06 / F-P2-09)
# ============================================================================
#
# The `walera-secrets` Secret MUST exist in the cluster BEFORE
# `kubectl apply -k deploy/k8s/` is run. This file is a TEMPLATE / OPERATOR
# REFERENCE — it is NOT included in deploy/k8s/kustomization.yaml's
# `resources:` list, so `kubectl apply -k` will NOT create or replace your
# real Secret.
#
# Walera's startup validation fails fast if the required database_url key is
# missing or empty, giving the operator a clear failure signal rather than a
# runtime PG connection loop.
#
# Choose ONE of the three operator workflows documented in
# deploy/POSTGRES-SETUP.md §7 to create the Secret:
#
#   1. Direct kubectl create (simplest, one-shot):
#        kubectl create secret generic walera-secrets \
#          --namespace=walera \
#          --from-literal=database_url='postgres://walera:...@pg:5432/db?sslmode=require'
#
#   The single role in database_url MUST have the REPLICATION attribute —
#   Walera derives the replication connection from this one URL. Do NOT
#   append replication=database to it.
#
#   2. sealed-secrets (GitOps-friendly):
#        kubeseal -o yaml < raw-secret.yaml > sealed-secret.yaml  # safe to commit
#
#   3. external-secrets-operator (Vault / AWS SM / GCP SM):
#        See https://external-secrets.io/ — bind ExternalSecret to walera-secrets.
#
# Key names below MUST match the secretKeyRef.key values in deployment.yaml.
#
# ============================================================================
# The Secret SHAPE below is provided for operator reference only.
# Do NOT commit this file with real `stringData:` values populated.
# ============================================================================
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: walera-secrets
#   namespace: walera
#   labels:
#     app: walera
# type: Opaque
# stringData:
#   # Single Postgres DSN; the role MUST have the REPLICATION attribute.
#   database_url: '<postgres://walera:...@pg:5432/db?sslmode=require>'
