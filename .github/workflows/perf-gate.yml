# =============================================================================
# .github/workflows/perf-gate.yml — Phase 20 GATE-02 perf-regression gate.
#
# Runs the build-tagged perf-gate test (test/perf/v14_gate_test.go, package
# perf, //go:build perf_gate) on every PR and push-to-master that touches
# the v1.4 perf surface. The gate test itself owns the compose lifecycle
# (up → 1k+5k bench → strace sample → down -v --remove-orphans in
# t.Cleanup); this workflow just provides the runtime environment + the
# GOMAXPROCS=4 production-parity scheduler pin + the failure-artifact
# upload step.
#
# Authoring constraints (Phase 20 CONTEXT.md):
#   - Self-hosted runner labeled `[self-hosted, deeb007]` only. The
#     gate test was calibrated on deeb007 against the VAL-01 strace
#     baseline + Phase 19 ratio-based thresholds; running on any other
#     runner would invalidate the measurement basis.
#   - GOMAXPROCS=4 — production container CPU budget. Without this, the
#     gate test would see Go's default GOMAXPROCS=runtime.NumCPU() which
#     on deeb007 is 16, changing the scheduler parallelism vs. Phase 19's
#     4-CPU compose-limited capture.
#   - Path filter restricted to the directories that can affect the
#     pool/router/config/main perf surface (plus test/perf/** and the
#     workflow file itself). Other PRs (docs, frontend, testbench tweaks,
#     .planning/) are not gated by this workflow.
#   - On failure: upload bench-out/perf-gate-* as a GH Actions artifact
#     so the operator can post-mortem from the PR check page without SSH'ing
#     to the runner.
#   - `compose down -v --remove-orphans` runs unconditionally via
#     `if: always()` — the gate test's t.Cleanup is the primary cleanup,
#     this is the belt-and-braces safety net for a workflow-cancel /
#     SIGKILL path that bypasses t.Cleanup.
#
# Out of scope (operator concerns; user owns these):
#   - Self-hosted runner registration (gh-actions-runner service install)
#   - Runner firewall / GitHub Actions egress allowlist
#   - Runner OS / docker / Go toolchain patching
#   - Secret rotation (this workflow does not consume secrets beyond
#     GITHUB_TOKEN's default contents:read scope and any env vars in
#     testbench/.env that the gate test reads off-disk)
# =============================================================================

name: Perf Gate

on:
  push:
    branches: [master]
    paths:
      # Production code paths that directly affect emission throughput.
      - 'internal/sse/**'
      - 'internal/router/**'
      - 'internal/wal/**'
      - 'internal/auth/**'
      - 'internal/config/**'
      - 'cmd/cdc-sse/**'
      # The gate test itself + the bench harness it drives.
      - 'test/perf/**'
      - 'scripts/bench.sh'
      # The compose stack defines the production-parity CPU/memory limits
      # the gate is calibrated against; an override file can quietly inflate
      # measured rates by raising the CPU cap.
      - 'testbench/docker-compose.yml'
      - 'testbench/docker-compose.override.yml'
      # Dep version bumps (pglogrepl/pgx/etc) can change syscall behaviour
      # and break the writev:events ratio invariant.
      - 'go.mod'
      - 'go.sum'
      # Runtime base image — Go version / distroless rev directly affects
      # throughput.
      - 'Dockerfile'
      - '.github/workflows/perf-gate.yml'
  pull_request:
    branches: [master]
    paths:
      - 'internal/sse/**'
      - 'internal/router/**'
      - 'internal/wal/**'
      - 'internal/auth/**'
      - 'internal/config/**'
      - 'cmd/cdc-sse/**'
      - 'test/perf/**'
      - 'scripts/bench.sh'
      - 'testbench/docker-compose.yml'
      - 'testbench/docker-compose.override.yml'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/perf-gate.yml'

permissions:
  contents: read

jobs:
  gate:
    runs-on: [self-hosted, deeb007]
    timeout-minutes: 12
    defaults:
      run:
        shell: bash
    env:
      COMPOSE_PROJECT_NAME: walera-perf-gate-ci
      GOMAXPROCS: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build bench binaries (writer + loadgen)
        # scripts/bench.sh expects ./writer and ./loadgen at the repo root
        # (defaults from scripts/bench.sh). Pre-build them here so the gate
        # test does not pay the build cost mid-bench window.
        run: |
          go build -o ./writer ./cmd/writer
          go build -o ./loadgen ./cmd/loadgen

      - name: Run perf-gate (1k + 5k)
        # -tags=perf_gate    — file is build-tagged, mandatory.
        # -run TestPerfGate  — prefix-matches both TestPerfGateV1k and TestPerfGateV5k.
        # -count=1           — defeat the Go test cache; the bench MUST execute.
        # -v                 — surface measured ratios in the PR check log.
        # -timeout=10m       — defensive; the job-level timeout-minutes: 12 is the outer cap.
        env:
          GOMAXPROCS: "4"
        run: go test -tags=perf_gate -run TestPerfGate -count=1 -v -timeout=10m ./test/perf/...

      - name: Upload bench artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: perf-gate-artifacts-${{ github.run_id }}
          path: bench-out/perf-gate-*
          if-no-files-found: warn
          retention-days: 14

      - name: Compose down (always; t.Cleanup primary, this is belt-and-braces)
        if: always()
        run: cd testbench && docker compose down -v --remove-orphans || true
