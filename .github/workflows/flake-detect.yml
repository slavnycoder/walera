# =============================================================================
# .github/workflows/flake-detect.yml — Phase 11 / CI-04 scheduled stress soak.
#
# Three parallel jobs:
#   - sse-stress    make sse-stress     (-race -count=100 ./internal/sse)
#   - wal-stress    make wal-stress     (-race -count=10  ./internal/wal)
#   - router-stress go test -race -count=100 ./internal/router   (no Makefile
#                   target — CI-04 spec text names the package directly).
#
# Triggers:
#   - cron '0 6 * * *'    daily at 06:00 UTC
#   - workflow_dispatch   manual run before releases
#
# On failure each job opens a GitHub issue labelled `flake` linking to the
# failing run via actions/github-script. The label is created on first use.
#
# timeout-minutes is generous (60) per job; sse-stress is the long pole.
# Tune downward once a few real runs land an empirical wall-clock.
# =============================================================================

name: Flake Detect

on:
  schedule:
    # Daily 06:00 UTC. No other workflow on this repo uses this slot at
    # phase-11 land time. Tune freely; the schedule is informational, not
    # a contract.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # actions/github-script opens issues on failure

concurrency:
  # Cancel-in-progress=false: a long-running scheduled run is NOT killed
  # by a workflow_dispatch click. The schedule and dispatch share the
  # same group only to prevent two concurrent scheduled runs.
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  sse-stress:
    name: sse-stress
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: make sse-stress
        run: make sse-stress

      - name: Open flake issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const labelName = 'flake';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
              });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'b60205',
                  description: 'Flaky test exposed by the scheduled flake-detect workflow.',
                });
              } else {
                throw err;
              }
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Flake: sse-stress failed on scheduled run',
              body: `\`make sse-stress\` failed on a scheduled flake-detect run.\n\nRun: ${runUrl}`,
              labels: [labelName],
            });

  wal-stress:
    name: wal-stress
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: make wal-stress
        run: make wal-stress

      - name: Open flake issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const labelName = 'flake';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
              });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'b60205',
                  description: 'Flaky test exposed by the scheduled flake-detect workflow.',
                });
              } else {
                throw err;
              }
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Flake: wal-stress failed on scheduled run',
              body: `\`make wal-stress\` failed on a scheduled flake-detect run.\n\nRun: ${runUrl}`,
              labels: [labelName],
            });

  sse-soak:
    name: sse-soak
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: make sse-soak
        # SSE-08 flake guard: full ./internal/sse suite at -count=100 without
        # -race. Orthogonal to sse-stress (which is -race + scoped to one
        # test). A regression that re-introduces the SSE-06 starvation
        # surface (attachCh/shutdownCh starved inside pollAllQueues) would
        # surface as TestPoolWorkerLoopStarvation_AttachAndShutdown failing
        # a fraction of the 100 runs.
        run: make sse-soak

      - name: Open flake issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const labelName = 'flake';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
              });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'b60205',
                  description: 'Flaky test exposed by the scheduled flake-detect workflow.',
                });
              } else {
                throw err;
              }
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Flake: sse-soak failed on scheduled run',
              body: `\`make sse-soak\` failed on a scheduled flake-detect run.\n\nRun: ${runUrl}`,
              labels: [labelName],
            });

  router-stress:
    name: router-stress
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go test -race -count=100 ./internal/router
        # CI-04 spec text names this package and count directly. No
        # Makefile target — the invocation is short enough to stay
        # inline. Mirrors `make sse-stress` shape (race + count=100).
        run: go test -race -count=100 ./internal/router

      - name: Open flake issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const labelName = 'flake';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
              });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'b60205',
                  description: 'Flaky test exposed by the scheduled flake-detect workflow.',
                });
              } else {
                throw err;
              }
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Flake: router-stress failed on scheduled run',
              body: `\`go test -race -count=100 ./internal/router\` failed on a scheduled flake-detect run.\n\nRun: ${runUrl}`,
              labels: [labelName],
            });
